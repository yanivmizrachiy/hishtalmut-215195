<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#eef7f4">
<title>לוח מפגשים — השתלמות 215195</title>
<link rel="stylesheet" href="assets/css/style.css">

<!-- MEETINGS_PREMIUM_STYLE_START -->
<style>
  body.meetings-page{
    min-height:100vh;
    color:#102033!important;
    background:
      radial-gradient(circle at 8% 0%,rgba(186,230,253,.52),transparent 25rem),
      radial-gradient(circle at 96% 8%,rgba(250,235,215,.72),transparent 25rem),
      radial-gradient(circle at 50% 105%,rgba(219,234,254,.75),transparent 30rem),
      linear-gradient(135deg,#f0fbff 0%,#ffffff 46%,#fff7ed 100%)!important;
  }
  body.meetings-page::before,body.meetings-page::after{display:none!important}
  .meetings-page .sub-page-header{
    max-width:1180px;margin:1rem auto 1.1rem;padding:clamp(1.2rem,4vw,2.35rem);
    border-radius:34px;position:relative;overflow:hidden;color:#fff;
    background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 54%,#0e7490 100%);
    border:1px solid rgba(255,255,255,.32);
    box-shadow:0 28px 80px rgba(15,23,42,.24);
  }
  .meetings-page .sub-page-header::after{
    content:"";position:absolute;inset:auto -90px -120px auto;width:285px;height:285px;border-radius:999px;
    background:radial-gradient(circle,rgba(253,230,138,.34),transparent 70%);pointer-events:none;
  }
  .meetings-page .sub-page-header h1{
    margin:.7rem 0 .35rem;color:#fff!important;background:none!important;-webkit-text-fill-color:#fff!important;
    font-size:clamp(2rem,7vw,4.4rem);line-height:1;text-shadow:0 10px 34px rgba(0,0,0,.26)!important;
  }
  .meetings-page .sub-page-header p{margin:.35rem 0 0;color:#dff6ff!important;font-weight:900;line-height:1.55}
  .meetings-page .top-back{
    display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:white!important;font-weight:900;
    border-radius:999px;padding:.78rem 1rem;background:linear-gradient(135deg,#0ea5e9,#2563eb)!important;
    border:1px solid rgba(255,255,255,.25);box-shadow:0 12px 28px rgba(14,165,233,.28)!important;
  }
  .meetings-page main{max-width:1180px;margin:auto;padding:0 1rem 2rem}
  .meetings-page #schedule{
    margin:0;padding:clamp(1rem,3vw,1.5rem);border-radius:30px;background:rgba(255,255,255,.72)!important;
    border:1px solid rgba(255,255,255,.86)!important;box-shadow:0 24px 70px rgba(15,23,42,.15)!important;backdrop-filter:blur(16px);
  }
  .meetings-page #meetings.meeting-grid{display:grid!important;grid-template-columns:1fr!important;gap:.88rem!important}
  .meetings-page .meeting-line{
    position:relative;display:grid!important;grid-template-columns:minmax(96px,auto) 1fr minmax(132px,auto)!important;align-items:center!important;gap:.8rem!important;
    min-height:70px!important;padding:1rem 1.1rem!important;border-radius:24px!important;color:#102033!important;
    background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(248,250,252,.96))!important;
    border:1px solid rgba(186,230,253,.78)!important;
    box-shadow:0 18px 42px rgba(14,116,144,.12),inset 0 1px 0 rgba(255,255,255,.95)!important;
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;overflow:hidden;
  }
  .meetings-page .meeting-line::before{content:"";position:absolute;inset:0 auto 0 0;width:7px;background:#94a3b8}
  .meetings-page .meeting-line:hover{transform:translateY(-2px);box-shadow:0 24px 58px rgba(14,116,144,.18),inset 0 1px 0 rgba(255,255,255,.95)!important}
  .meetings-page .meeting-line.done{
    border-color:rgba(92,135,119,.44)!important;
    background:linear-gradient(90deg,#dff2e8 0%,#ecf8f2 48%,#f8fffb 100%)!important;
  }
  .meetings-page .meeting-line.done::before{background:linear-gradient(180deg,#7aa893,#4f7f6b)}
  .meetings-page .meeting-line.future{
    border-color:rgba(179,104,119,.40)!important;
    background:linear-gradient(90deg,#f9dde2 0%,#fff0f1 50%,#fffaf4 100%)!important;
  }
  .meetings-page .meeting-line.future::before{background:linear-gradient(180deg,#c98691,#9f5b68)}
  .meetings-page .meeting-line.next{
    border:2px solid rgba(204,156,63,.58)!important;
    background:linear-gradient(90deg,#fff8e7 0%,#ffffff 56%,#effaff 100%)!important;
    box-shadow:0 0 0 7px rgba(250,204,21,.11),0 26px 64px rgba(204,156,63,.18),inset 0 1px 0 rgba(255,255,255,.95)!important;
  }
  .meetings-page .meeting-line.next::before{background:linear-gradient(180deg,#d8ad55,#b7791f)}
  .meetings-page .next-feature-title{
    grid-column:1/-1;display:inline-flex;width:max-content;align-items:center;justify-content:center;border-radius:999px;
    padding:.42rem .76rem;color:#7a4b12!important;background:linear-gradient(135deg,#fff5d6,#f7df9b);
    border:1px solid rgba(204,156,63,.34);font-weight:900;box-shadow:0 10px 24px rgba(204,156,63,.14);
  }
  .meetings-page .meeting-line-number{
    justify-self:center;text-align:center;font-weight:900;color:#17324d!important;white-space:nowrap;padding:.35rem .65rem;border-radius:999px;
    background:#eef7ff;border:1px solid #cfe8f7;
  }
  .meetings-page .meeting-line-date{font-weight:900;color:#102033!important;white-space:normal;line-height:1.45;text-align:center}
  .meetings-page .meeting-line-time{
    display:inline-flex;direction:ltr!important;unicode-bidi:isolate!important;text-align:left!important;white-space:nowrap!important;
    font-weight:900;color:#075985!important;background:#e8f8ff;border:1px solid #c7edf9;border-radius:999px;
    padding:.18rem .48rem;margin-inline:.18rem;font-family:ui-monospace,Consolas,Menlo,monospace;
  }
  .meetings-page .meeting-line-status{
    justify-self:center;display:inline-flex;align-items:center;justify-content:center;min-width:116px;text-align:center;
    border-radius:999px;padding:.52rem .82rem;font-weight:900;white-space:nowrap;
    box-shadow:0 10px 22px rgba(15,23,42,.10);border:1px solid rgba(255,255,255,.7);
  }
  .meetings-page .meeting-line-status.done{color:#14532d!important;background:linear-gradient(135deg,#cce8dc,#f2fbf6)!important}
  .meetings-page .meeting-line-status.future{color:#8f1d32!important;background:linear-gradient(135deg,#efcbd1,#fff1f2)!important}
  .meetings-page .meeting-resource-buttons{grid-column:1/-1;display:flex;justify-content:center;flex-wrap:wrap;gap:.55rem;margin-top:.35rem}
  .meetings-page .meeting-resource-button{
    text-decoration:none;color:#fff!important;font-family:inherit;font-weight:900;border-radius:999px;padding:.68rem 1rem;
    background:linear-gradient(135deg,#2563eb,#7c3aed)!important;box-shadow:0 12px 28px rgba(37,99,235,.24)!important;border:1px solid rgba(255,255,255,.25);
  }
  .meetings-page .meeting-resource-button.summary-button{background:linear-gradient(135deg,#4f7f6b,#2f5d4e)!important}
  @media(max-width:640px){
    .meetings-page .sub-page-header{margin:.75rem;border-radius:26px}.meetings-page main{padding:0 .75rem 1.5rem}
    .meetings-page .meeting-line{grid-template-columns:1fr!important;align-items:center!important;padding:1rem!important;text-align:center}
    .meetings-page .meeting-line-status{justify-self:center!important}.meetings-page .meeting-resource-button{width:100%;text-align:center}
  }
  @media print{
    .meetings-page .meeting-resource-buttons,.meetings-page .top-back{display:none!important}
    .meetings-page{background:white!important;color:#111827!important}
    .meetings-page .sub-page-header,.meetings-page #schedule,.meetings-page .meeting-line{box-shadow:none!important}
  }
</style>
<!-- MEETINGS_PREMIUM_STYLE_END -->
</head>

</header>

<main>
  <section id="schedule" class="panel small-panel">
    <div id="meetings" class="meeting-grid"></div>
  </section>
</main>

</html>
