<style>
  .presentation-card-only-wrap{
    max-width:1180px;
    margin:1rem auto 2rem;
    padding:0 1rem;
  }
  .presentation-card-only-link{
    display:block;
    text-decoration:none;
  }
  .presentation-card-only-frame{
    overflow:hidden;
    border-radius:28px;
    border:1px solid rgba(148,163,184,.35);
    background:linear-gradient(135deg,#0f172a,#1e1b4b);
    box-shadow:0 18px 50px rgba(15,23,42,.22);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .presentation-card-only-link:hover .presentation-card-only-frame{
    transform:translateY(-3px);
    box-shadow:0 26px 65px rgba(15,23,42,.30);
  }
  .presentation-card-only-frame img{
    display:block;
    width:100%;
    height:auto;
  }

  .main-action-button.meetings-gold-button{
    transform:scale(1.35);
    transform-origin:center;
    min-width:min(92vw,360px);
    min-height:74px;
    font-size:clamp(1.25rem,5.6vw,2rem)!important;
    color:#3f2f07!important;
    background:
      radial-gradient(circle at 18% 10%,rgba(255,255,255,.92),transparent 12rem),
      linear-gradient(135deg,#fff8d6 0%,#f6d98b 52%,#d6a93f 100%)!important;
    border:1px solid rgba(146,100,20,.35)!important;
    box-shadow:0 20px 46px rgba(180,126,28,.28),inset 0 1px 0 rgba(255,255,255,.82)!important;
  }
  .main-action-button.meetings-gold-button:hover{
    transform:scale(1.38) translateY(-2px);
    box-shadow:0 28px 62px rgba(180,126,28,.34),inset 0 1px 0 rgba(255,255,255,.86)!important;
  }
  @media(max-width:700px){
    .presentation-card-only-wrap{margin:.8rem auto 1.5rem;padding:0 .75rem}
    .presentation-card-only-frame{border-radius:22px}
    .main-action-button.meetings-gold-button{
      transform:scale(1.18);
      min-width:100%;
      min-height:76px;
      margin:.55rem 0 .85rem;
    }
    .main-action-button.meetings-gold-button:hover{transform:scale(1.18)}
  }
  @media print{
    .presentation-card-only-wrap{display:none!important}
  }
</style>

</head>
<body>
<header id="home" class="hero clean-home">
  <section class="hero-inner hero-inner-single">
    <div class="hero-text">

      <p id="siteNumber" class="training-number">מס׳ 215195</p>

      <div class="clock-card clock-under-title">
        <div id="todayText">טוען תאריך...</div>
        <div id="clock">--:--:--</div>
      </div>

      <div class="home-buttons">
        <a class="main-action-button meetings-gold-button" href="meetings.html">לוח מפגשים</a>
        <a class="main-action-button" href="materials.html">חומרים להדפסה</a>
      </div>
    </div>
  </section>
</header>


<main>
  <section id="meeting-2-canva-home" class="presentation-card-only-wrap" aria-label="מצגת השתלמות מפגש שני">

      <div class="presentation-card-only-frame">
        <img src="assets/img/meeting-2-presentation-cover.svg" alt="מצגת השתלמות מפגש שני">
      </div>
